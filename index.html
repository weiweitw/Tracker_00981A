<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00981A 每日成分股變化追蹤</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: #f4f7f6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: right;
        }

        th {
            background-color: #0056b3;
            color: white;
            text-align: center;
        }

        td:nth-child(1),
        td:nth-child(2) {
            text-align: center;
        }

        .up {
            color: #d9534f;
            /* 紅色代表增加 */
            font-weight: bold;
        }

        .down {
            color: #5cb85c;
            /* 綠色代表減少 */
            font-weight: bold;
        }

        .neutral {
            color: #999;
        }

        .update-info {
            text-align: right;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>00981A 統一台灣高息動能 ETF 成分股追蹤</h1>
        <div class="update-info">
            最後更新日期：<span id="update-time">載入中...</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>代號</th>
                    <th>名稱</th>
                    <th>今日張數</th>
                    <th>張數增減</th>
                    <th>今日市值 (元)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="5" style="text-align: center;">資料載入中...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // 讀取 JSON 資料
        fetch('data/daily_diff.json')
            .then(res => {
                if (!res.ok) throw new Error('Network response was not ok');
                return res.json();
            })
            .then(data => {
                // 將網頁上的更新時間替換為 JSON 內記錄的 EditDate
                document.getElementById('update-time').textContent = data.updateDate;

                const tbody = document.getElementById('table-body');
                tbody.innerHTML = ''; // 清空載入中提示

                // 迴圈要改為遍歷 data.holdings
                data.holdings.forEach(stock => {
                    const diffShares = stock.sharesDiff;
                    let diffClass = 'neutral';
                    let diffText = diffShares === 0 ? '-' : diffShares.toLocaleString();

                    if (diffShares > 0) {
                        diffClass = 'up';
                        diffText = '+' + diffShares.toLocaleString();
                    } else if (diffShares < 0) {
                        diffClass = 'down';
                    }

                    const amountFormatted = stock.amountToday === 0 ? '-' : Math.round(stock.amountToday).toLocaleString();
                    const currentSharesFormatted = stock.sharesToday === 0 ? '-' : stock.sharesToday.toLocaleString();

                    const tr = document.createElement('tr');
                    // 這裡先為未來的趨勢圖準備好連結 detail.html?code=XXXX
                    tr.innerHTML = `
                        <td>${stock.code}</td>
                        <td><a href="detail.html?code=${stock.code}" style="color: #0056b3; text-decoration: none; font-weight: bold;">${stock.name}</a></td>
                        <td>${currentSharesFormatted}</td>
                        <td class="${diffClass}">${diffText}</td>
                        <td>${amountFormatted}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => {
                console.error("讀取資料失敗:", err);
                document.getElementById('table-body').innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">讀取失敗，請確認 data/daily_diff.json 是否存在且格式正確。</td></tr>';
            });
    </script>
</body>

</html>
